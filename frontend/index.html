<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApplianceCare — Consultation Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app" id="app">

    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-left">
            <div class="logo">
                <div class="logo-icon">⚙</div>
                <span class="logo-name">ApplianceCare</span>
            </div>
            <div class="bot-badge" id="botBadge" style="display:none;">
                <div class="bot-badge-dot" id="botBadgeDot"></div>
                <span id="botBadgeName">Angel</span>
                <span class="bot-badge-label">· Active</span>
            </div>
        </div>
        <div class="topbar-right">
            <button class="btn-ghost" onclick="Chat.reset()">↺ New Booking</button>
        </div>
    </header>

    <!-- Demo video -->
    <details class="demo-video">
        <summary>▶ Watch form tutorial</summary>
        <div class="demo-video-frame-wrap">
            <iframe
                id="tutorialVideo"
                width="560"
                height="315"
                frameborder="0"
                allowfullscreen
                referrerpolicy="strict-origin-when-cross-origin"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            ></iframe>
        </div>
    </details>

    <!-- Messages -->
    <main class="messages" id="messages"></main>

    <!-- Input -->
    <footer class="inputbar">
        <div class="input-wrap" id="inputWrap">
            <input
                type="text"
                id="userInput"
                placeholder="Type a message…"
                autocomplete="off"
                onkeydown="Chat.handleKey(event)"
            />
            <button class="send-btn" id="sendBtn" onclick="Chat.send()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </footer>

</div>

<!-- RESTART MODAL -->
<div class="modal-overlay" id="restartModal" style="display: none;">
    <div class="modal-content">
        <h3 class="modal-title">Start a new booking?</h3>
        <p class="modal-text">Your current conversation will be cleared.</p>
        <div class="modal-actions">
            <button class="modal-btn cancel" onclick="Chat.cancelRestart()">Cancel</button>
            <button class="modal-btn confirm" onclick="Chat.confirmRestart()">Confirm</button>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="script.js?v=9"></script>

<script>
    // Build YouTube iframe src from CONFIG — no hardcoding
    function initYouTubePlayer() {
        const yt = CONFIG.YOUTUBE;
        const params = new URLSearchParams({
            controls:        yt.controls,
            fs:              yt.fs,
            rel:             yt.rel,
            modestbranding:  yt.modestbranding,
            cc_load_policy:  yt.cc_load_policy,
            autoplay:        yt.autoplay
        });
        const iframe = document.getElementById('tutorialVideo');
        if (iframe) {
            iframe.src = 'https://www.youtube.com/embed/' + yt.videoId + '?' + params.toString();
        }
    }

    // Pause video when tutorial section is collapsed
    document.querySelector('.demo-video').addEventListener('toggle', function() {
        if (!this.open) {
            const iframe = document.getElementById('tutorialVideo');
            if (iframe) {
                const src = iframe.src;
                iframe.src = '';
                iframe.src = src;
            }
        }
    });

    // Run on page load
    initYouTubePlayer();
</script>

</body>
</html>
